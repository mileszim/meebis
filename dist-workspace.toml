[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "mileszim/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Target platforms to build apps for (Rust target-triple syntax).
# Unix-only by design: meebis is a disposable local dev tool. arm64 + x86_64
# for both macOS and Linux; no Windows target (unverified, and out of scope).
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-gnu",
]
# release-please already creates the (draft) GitHub Release and git tag from the
# merged release PR. dist does not create its own release: it builds artifacts,
# uploads them to that existing draft, and undrafts it once all are present.
create-release = false
